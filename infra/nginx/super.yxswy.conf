# WebSocket 支持
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---------- super.yxswy.com HTTP -> HTTPS ----------
server {
    listen 80;
    listen [::]:80;
    server_name super.yxswy.com;

    return 301 https://super.yxswy.com$request_uri;
}

# ---------- super.yxswy.com HTTPS ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name super.yxswy.com;

    ssl_certificate     /etc/letsencrypt/live/super.yxswy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/super.yxswy.com/privkey.pem;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_ciphers PROFILE=SYSTEM;
    ssl_prefer_server_ciphers on;

    root /home/super/dist-web;

    # ---------- API 反向代理 ----------
    location /api/ {
        proxy_pass http://127.0.0.1:5013;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_buffering off;
        proxy_cache off;
    }

    # ---------- 前端 SPA ——— 逐路径挂载 ----------

    # site (/)
    location = / {
        try_files /index.html =404;
    }
    location = /index.html {
        try_files /index.html =404;
    }
    location /_assets/ {
        try_files $uri =404;
    }

    # auth
    location /auth/ {
        try_files $uri $uri/ /auth/index.html =404;
    }

    # ── 统一 React App（workspace / canvas / assets / api-console） ──
    location /app/_assets/ {
        try_files $uri =404;
    }

    location /workspace/ {
        try_files $uri $uri/ /app/index.html =404;
    }

    location /canvas/ {
        try_files $uri $uri/ /app/index.html =404;
    }

    location /assets/ {
        try_files $uri $uri/ /app/index.html =404;
    }

    location /api-console/ {
        try_files $uri $uri/ /app/index.html =404;
    }

    # transfer (Vue 3, 独立)
    location /transfer/ {
        try_files $uri $uri/ /transfer/index.html =404;
    }

    # ---------- 兜底 ----------
    location / {
        try_files $uri /404.html =404;
    }

    location ~ /\. {
        deny all;
    }
}
