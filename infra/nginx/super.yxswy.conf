# =============================================================================
# Super 统一工作区 — Nginx 配置
# 域名: super.yxswy.com
# 架构: 单域名路径路由 → 多个 SPA + 一个 API 后端
# =============================================================================

upstream api_backend {
    server 127.0.0.1:5200;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name super.yxswy.com;

    # 强制 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name super.yxswy.com;

    # SSL 证书（请替换为实际路径）
    ssl_certificate     /etc/nginx/ssl/super.yxswy.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/super.yxswy.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 安全头
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # 静态资源根目录（collect:frontends 输出）
    root /srv/super/dist-web;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;
    gzip_vary on;

    # =========================================================================
    # API 反向代理（优先级最高）
    # =========================================================================
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # 上传大文件
        client_max_body_size 500M;
    }

    # =========================================================================
    # SPA 前端应用 — 逐个按 base 路径挂载
    # =========================================================================

    # --- site (/) ---
    location = / {
        try_files /index.html =404;
    }
    location /_assets/ {
        # 所有 app 共享 _assets 输出目录
        # site 的 _assets 在根，其余 app 的 _assets 在其 base 子目录下
        try_files $uri =404;
    }

    # --- auth (/auth/) ---
    location /auth/ {
        try_files $uri $uri/ /auth/index.html =404;
    }

    # --- workspace (/workspace/) ---
    location /workspace/ {
        try_files $uri $uri/ /workspace/index.html =404;
    }

    # --- canvas (/canvas/) ---
    location /canvas/ {
        try_files $uri $uri/ /canvas/index.html =404;
    }

    # --- assets library (/assets/) ---
    location /assets/ {
        try_files $uri $uri/ /assets/index.html =404;
    }

    # --- transfer (/transfer/) ---
    location /transfer/ {
        try_files $uri $uri/ /transfer/index.html =404;
    }

    # --- api-console (/api-console/) ---
    location /api-console/ {
        try_files $uri $uri/ /api-console/index.html =404;
    }

    # =========================================================================
    # 兜底
    # =========================================================================
    location / {
        try_files $uri /404.html =404;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
