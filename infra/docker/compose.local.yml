name: super-local

services:
  postgres:
    image: postgres:17-alpine
    container_name: super-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: super
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - super-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d super']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  super-postgres-data:
