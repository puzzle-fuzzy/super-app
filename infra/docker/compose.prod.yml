version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: super
      POSTGRES_PASSWORD: super_dev
      POSTGRES_DB: super
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'super']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: api
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://super:super_dev@postgres:5432/super
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      target: worker
    ports:
      - '5100:5100'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://super:super_dev@postgres:5432/super
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      target: web
    ports:
      - '80:80'
    depends_on:
      - api

volumes:
  pgdata:
